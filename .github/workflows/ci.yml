name: ci

on:
  push:
    paths-ignore:
    - 'README.md'
    - 'readme.md'
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip-ci]') &&
      !contains(github.event.pull_request.title, '[skip-ci]')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      run: msbuild Src\Xultaik.sln /p:Configuration=Release /p:Platform=x64
